<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mes Certifications — Serigne Amdy CISSE</title>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body { font-family: 'Poppins', sans-serif; background-color: #f8fafc; color: #0f172a; }
        .cert-card { background: white; border: 1px solid #e2e8f0; border-radius: 12px; padding: 24px; display: flex; align-items: center; gap: 20px; transition: transform 0.3s, box-shadow 0.3s; }
        .cert-card:hover { transform: translateY(-5px); box-shadow: 0 10px 25px rgba(0,0,0,0.05); border-color: #cbd5e1; }
        .cert-icon { width: 60px; height: 60px; display: flex; align-items: center; justify-content: center; background: #f1f5f9; border-radius: 12px; flex-shrink: 0; }
    </style>
</head>
<body class="p-6 md:p-12">

    <main class="max-w-4xl mx-auto">
        
        <a href="index.html" class="inline-flex items-center gap-2 text-slate-500 hover:text-blue-600 transition-colors font-medium text-sm mb-8">
        ← Retour au Portfolio
        </a>

        <h1 class="text-3xl font-bold text-slate-900 mb-2">Certifications & Attestations</h1>
        <p class="text-slate-600 mb-10">Validation continue de mes compétences techniques auprès d'organismes reconnus.</p>

        <div class="grid grid-cols-1 md:grid-cols-2 gap-6">
            
            <div class="cert-card">
                <div class="cert-icon">
                    <svg viewBox="0 0 32 32" width="32" height="32" xmlns="http://www.w3.org/2000/svg">
                        <rect x="2" y="2" width="28" height="28" rx="5" fill="#0D9E51"/>
                        <text x="4" y="21" font-family="monospace" font-size="10" font-weight="bold" fill="#fff">3CX</text>
                    </svg>
                </div>
                <div>
                    <h3 class="font-bold text-lg text-slate-900">3CX Basic Certification</h3>
                    <p class="text-sm text-slate-500">Obtenue en Novembre 2025</p>
                    <span class="inline-block mt-2 text-xs font-semibold px-2 py-1 bg-green-100 text-green-700 rounded">VoIP & Téléphonie</span>
                </div>
            </div>

            <div class="cert-card">
                <div class="cert-icon">
                    <svg viewBox="0 0 24 24" width="32" height="32" fill="none" stroke="#1a56e8" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                        <path d="M12 22s8-4 8-10V5l-8-3-8 3v7c0 6 8 10 8 10z"></path>
                    </svg>
                </div>
                <div>
                    <h3 class="font-bold text-lg text-slate-900">SecNumAcadémie (ANSSI)</h3>
                    <p class="text-sm text-slate-500">Obtenue en Novembre 2024</p>
                    <span class="inline-block mt-2 text-xs font-semibold px-2 py-1 bg-blue-100 text-blue-700 rounded">Cybersécurité</span>
                </div>
            </div>

        </div>
    </main>

</body>
</html>
